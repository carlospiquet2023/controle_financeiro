services:
  app:
    build: .
    ports: ["3000:3000"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://finora:finora_dev@db:5432/finora?schema=public
      APP_URL: http://localhost:3000
    depends_on:
      db: { condition: service_healthy }
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: finora
      POSTGRES_USER: finora
      POSTGRES_PASSWORD: finora_dev
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finora -d finora"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  postgres-data:
